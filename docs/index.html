<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ørsted — Fleet Production (live)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A171F;--bg2:#0E1E28;--panel:#12262F;--panel2:#163038;--raise:#1B3A44;--ink:#E8F0F3;--mut:#8AA3AF;--dim:#5E7C88;--line:#22434F;--line2:#2C505D;--off:#37C7D6;--on:#E9A64C;--pos:#54B87C;--neg:#E4655F;--warn:#F0C05A;--off1:#0F6E79;--off2:#16929E;--off3:#37C7D6;--off4:#6FDBE6;--off5:#A7EAF0;--off6:#4A9FB8;--on1:#B9741C;--on2:#E9A64C;--on3:#F2C37E;--on4:#F8DCAE;}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(120% 80% at 78% -10%,rgba(55,199,214,.07),transparent 60%),var(--bg);color:var(--ink);font-family:"IBM Plex Sans",system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.mono{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums}h1,h2,h3{font-family:"Space Grotesk",sans-serif;letter-spacing:-.01em}
.wrap{max-width:1280px;margin:0 auto;padding:0 24px}
header{border-bottom:1px solid var(--line)}
.head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;padding:22px 0 18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px}.mark{width:34px;height:34px}
.brand h1{font-size:20px;margin:0}.brand .sub{color:var(--mut);font-size:12px;margin-top:2px}
.meta{text-align:right;color:var(--dim);font-size:11px;line-height:1.7;text-transform:uppercase;letter-spacing:.07em}.meta b{color:var(--mut)}
.demo{background:rgba(240,192,90,.14);border:1px solid rgba(240,192,90,.35);color:var(--warn);border-radius:8px;padding:8px 12px;margin:12px 0;font-size:12.5px}
.kstrip{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin:16px 0}
.kpi{background:var(--panel);padding:14px 16px;position:relative}.kpi .lab{color:var(--dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;font-weight:600}.kpi .val{font-size:22px;font-weight:600;margin-top:4px}.kpi .u{font-size:12px;color:var(--mut);margin-left:3px}.kpi .tick{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--off)}.kpi.on .tick{background:var(--on)}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:18px 0 14px}
.ctl{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
select,.btn{background:var(--panel);border:1px solid var(--line);color:var(--ink);font-family:"IBM Plex Sans";font-size:13px;padding:8px 12px;border-radius:8px;cursor:pointer}
.btn.primary{background:linear-gradient(135deg,var(--off1),var(--off));border-color:transparent;color:#04141a;font-weight:600;font-family:"Space Grotesk"}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px}
.panel h3{margin:0 0 2px;font-size:14.5px}.cap{color:var(--dim);font-size:11.5px;margin-bottom:12px}
.chart{width:100%;display:block}.tk{fill:var(--dim);font-size:10px;font-family:"IBM Plex Mono"}.tk.mid{text-anchor:middle}.tk.end{text-anchor:end}.gline{stroke:var(--line);stroke-dasharray:2 3;opacity:.5}.axis{stroke:var(--line)}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px}.lg{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--mut)}.sw{width:11px;height:11px;border-radius:3px}
table.t{width:100%;border-collapse:collapse;font-size:12.5px}table.t th{text-align:right;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;padding:8px 9px;border-bottom:1px solid var(--line2);position:sticky;top:0;background:var(--panel)}table.t th:first-child,table.t td:first-child{text-align:left}table.t td{padding:6px 9px;border-bottom:1px solid var(--line);font-family:"IBM Plex Mono"}table.t tr:hover td{background:var(--panel2)}
.scroll{max-height:560px;overflow:auto;border:1px solid var(--line);border-radius:10px}
.pill{font-family:"IBM Plex Mono";font-size:11px;padding:2px 7px;border-radius:5px;background:var(--bg2);color:var(--mut)}
footer{color:var(--dim);font-size:11px;text-align:center;padding:24px 0 32px;line-height:1.7}
.warns{color:var(--warn);font-size:11.5px;line-height:1.7;margin-top:8px}
</style></head>
<body>
<header><div class="wrap">
  <div class="head">
    <div class="brand">
      <svg class="mark" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="19" stroke="#37C7D6" stroke-width="1.5" opacity=".4"/><path d="M20 6 L20 20 M20 20 L31 26 M20 20 L9 26" stroke="#37C7D6" stroke-width="2.2" stroke-linecap="round"/><circle cx="20" cy="20" r="2.6" fill="#E9A64C"/></svg>
      <div><h1>Ørsted · Fleet Production</h1><div class="sub">Live grid capture — Elexon · EIA · ENTSO-E · converted to Ørsted share</div></div>
    </div>
    <div class="meta">
      <div>Data refreshed <b id="m_gen">—</b></div>
      <div>Window <b id="m_win">—</b></div>
      <div id="m_src">—</div>
    </div>
  </div>
  <div id="demo" class="demo" style="display:none"></div>
  <div class="kstrip" id="kstrip"></div>
</div></header>
<main class="wrap" id="main"><div class="panel"><div class="cap" id="loading">Loading data/production.json…</div></div></main>
<footer class="wrap">Physical grid generation × consolidation % = Ørsted share. Refreshed server-side by GitHub Actions; this page reads the committed JSON.</footer>
<script>
const GEOCOL={'Denmark':'var(--off1)','United Kingdom':'var(--off3)','Germany':'var(--off2)','Netherlands':'var(--off6)','US Offshore':'var(--off4)','Taiwan':'var(--off5)','US Onshore':'var(--on2)','US Solar':'var(--on3)','Europe Onshore':'var(--on1)','Europe Solar':'var(--on4)'};
const SRCLAB={elexon:'GB — Elexon',eia:'US — EIA',entsoe:'DK/DE/NL + EU onshore — ENTSO-E',manual:'Taiwan / other — manual'};
const fmt=(v,d=0)=>v==null||isNaN(v)?'—':(+v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const pct=(v,d=0)=>v==null||isNaN(v)?'—':(v*100).toFixed(d)+'%';
const sum=a=>a.reduce((s,x)=>s+(x||0),0);
const qKey=q=>{const m=q.match(/Q(\d)\s+(\d{4})/);return m?(+m[2])*4+(+m[1]-1):0;};
let DATA=null, VIEW={gran:'quarter',show:'share'};

fetch('data/production.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{DATA=d;init();})
 .catch(e=>{document.getElementById('loading').innerHTML='<span style="color:var(--neg)">Could not load data/production.json.</span> If this is a fresh repo, run the “Refresh production data” Action once (Actions tab ▸ Run workflow).';});

function init(){
  document.getElementById('m_gen').textContent=DATA.generated_at||'—';
  document.getElementById('m_win').textContent=(DATA.window?DATA.window.start+' → '+DATA.window.end:'—');
  const pulled=DATA.assets.filter(a=>Object.keys(a.phys||{}).length).length;
  document.getElementById('m_src').innerHTML=`<b>${pulled}</b> assets with live data`;
  if(DATA.demo){const el=document.getElementById('demo');el.style.display='block';
    el.innerHTML='⚠ DEMO DATA — synthesised from reported figures. Add your API secrets and run the Action for real grid data.';}
  renderKPIs(); renderMain();
}

function shareQ(a){ // {quarter: GWh Ørsted share}
  if(VIEW.gran==='quarter') return VIEW.show==='phys'?a.phys:a.share;
  // month view: derive from phys_m
  const out={}; for(const mk in (a.phys_m||{})){out[mk]=VIEW.show==='phys'?a.phys_m[mk]:(a.cons!=null?a.phys_m[mk]*a.cons:null);} return out;
}
function allPeriods(){const s=new Set();DATA.assets.forEach(a=>Object.keys(shareQ(a)||{}).forEach(p=>s.add(p)));
  return [...s].sort((x,y)=>VIEW.gran==='month'?x.localeCompare(y):qKey(x)-qKey(y));}

function renderKPIs(){
  const qs=DATA.assets.map(a=>a.share).filter(Boolean);
  const periods=[...new Set([].concat(...qs.map(o=>Object.keys(o))))].sort((a,b)=>qKey(a)-qKey(b));
  const last=periods[periods.length-1];
  const grp=sum(DATA.assets.map(a=>a.share[last]||0));
  const off=sum(DATA.assets.filter(a=>a.seg==='offshore').map(a=>a.share[last]||0));
  const on=sum(DATA.assets.filter(a=>a.seg==='onshore').map(a=>a.share[last]||0));
  const pulled=DATA.assets.filter(a=>Object.keys(a.phys||{}).length).length;
  const cards=[['Latest '+(last||'—'),fmt(grp),'GWh',''],['Offshore',fmt(off),'GWh',''],['Onshore',fmt(on),'GWh','on'],
    ['Offshore share',grp?fmt(off/grp*100):'—','%',''],['Assets live',pulled,'','on']];
  document.getElementById('kstrip').innerHTML=cards.map(c=>`<div class="kpi ${c[3]}"><span class="tick"></span><div class="lab">${c[0]}</div><div class="val mono">${c[1]}<span class="u">${c[2]}</span></div></div>`).join('');
}

function renderMain(){
  const main=document.getElementById('main');
  main.innerHTML=`
  <div class="controls">
    <label class="ctl">By</label><select id="gran"><option value="quarter">Quarter</option><option value="month">Month</option></select>
    <label class="ctl">Show</label><select id="show"><option value="share">Ørsted share</option><option value="phys">Physical 100%</option></select>
    <button class="btn primary" id="csv">Export CSV</button>
    <span class="pill">refreshed daily by GitHub Actions</span>
  </div>
  <div class="panel"><h3>Fleet production by geography</h3><div class="cap">Ørsted-share GWh, quarterly · stacked</div><div id="chart"></div><div class="legend" id="leg"></div></div>
  <div class="panel"><h3>Captured production — full fleet</h3><div class="cap">Every asset, grouped by source. Values where the pipeline has data; others show their route.</div><div id="table"></div></div>
  <div class="panel" id="zonewrap" style="display:none"><h3>Zone context · ENTSO-E</h3><div class="cap">Bidding-zone wind output (relative index). Market backdrop; no GB (none published post-Brexit).</div><div id="zones"></div></div>
  ${DATA.warnings&&DATA.warnings.length?`<div class="panel"><h3>Pipeline notes</h3><div class="warns">${DATA.warnings.map(w=>'• '+w).join('<br>')}</div></div>`:''}`;
  document.getElementById('gran').value=VIEW.gran; document.getElementById('show').value=VIEW.show;
  document.getElementById('gran').onchange=e=>{VIEW.gran=e.target.value;renderMain();};
  document.getElementById('show').onchange=e=>{VIEW.show=e.target.value;renderMain();};
  document.getElementById('csv').onclick=exportCSV;
  drawChart(); drawTable(); drawZones();
}

function drawChart(){
  const geos=Object.keys(GEOCOL).filter(g=>DATA.assets.some(a=>a.geo===g&&Object.keys(a.share||{}).length));
  const periods=[...new Set([].concat(...DATA.assets.map(a=>Object.keys(a.share||{}))))].sort((a,b)=>qKey(a)-qKey(b));
  const mount=document.getElementById('chart'); if(!periods.length){mount.innerHTML='<div class="cap">No live quarters yet.</div>';return;}
  const ser=geos.map(g=>({g,v:periods.map(p=>sum(DATA.assets.filter(a=>a.geo===g).map(a=>a.share[p]||0)))}));
  const tot=periods.map((_,i)=>sum(ser.map(s=>s.v[i]))); const ymax=Math.max(...tot,1)*1.1;
  const W=920,H=320,PL=52,PR=12,PT=12,PB=40,iw=W-PL-PR,ih=H-PT-PB,gap=iw/periods.length,bw=gap*.68;
  const NS='http://www.w3.org/2000/svg';let s=`<svg viewBox="0 0 ${W} ${H}" class="chart">`;
  for(let t=0;t<=4;t++){const y=PT+ih-ih*t/4;s+=`<line x1="${PL}" x2="${W-PR}" y1="${y}" y2="${y}" class="gline"/><text x="${PL-8}" y="${y+3}" class="tk end">${fmt(ymax*t/4)}</text>`;}
  periods.forEach((p,i)=>{let acc=0;const x=PL+gap*i+(gap-bw)/2;
    ser.forEach(se=>{const v=se.v[i];if(!v)return;const bh=v/ymax*ih;const y=PT+ih-acc-bh;acc+=bh;
      s+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${GEOCOL[se.g]}" rx="1"><title>${se.g} · ${p}: ${fmt(v)} GWh</title></rect>`;});
    if(i%2===0)s+=`<text x="${x+bw/2}" y="${H-PB+15}" class="tk mid" font-size="9">${p}</text>`;});
  s+=`<line x1="${PL}" x2="${W-PR}" y1="${PT+ih}" y2="${PT+ih}" class="axis"/></svg>`;
  mount.innerHTML=s;
  document.getElementById('leg').innerHTML=geos.map(g=>`<span class="lg"><span class="sw" style="background:${GEOCOL[g]}"></span>${g}</span>`).join('');
}

function drawTable(){
  const periods=allPeriods(); const mount=document.getElementById('table');
  if(!periods.length){mount.innerHTML='<div class="cap">No captured periods yet — run the Action.</div>';return;}
  const curY=new Date().getFullYear(),curQ='Q'+(Math.floor(new Date().getMonth()/3)+1)+' '+curY;
  const head=`<tr><th>Asset</th><th>src</th>${periods.map(p=>`<th>${p}${p===curQ?' <span style="color:var(--warn)">QTD</span>':''}</th>`).join('')}</tr>`;
  let body='';
  ['elexon','eia','entsoe','manual'].forEach(src=>{
    const rows=DATA.assets.filter(a=>a.src===src); if(!rows.length)return;
    const got=rows.filter(a=>Object.keys(shareQ(a)||{}).length).length;
    body+=`<tr><td colspan="${periods.length+2}" style="background:var(--panel2);font-weight:600;color:${src==='elexon'?'var(--off)':src==='eia'?'var(--on)':'var(--mut)'}">${SRCLAB[src]} · ${got}/${rows.length}</td></tr>`;
    rows.forEach(a=>{const v=shareQ(a)||{};
      body+=`<tr><td>${a.name}</td><td style="font-size:10px;color:var(--dim)">${src==='manual'?'manual':(Object.keys(v).length?'✓':(src==='entsoe'?'server':'—'))}</td>${periods.map(p=>`<td>${v[p]==null?'<span style="color:var(--dim)">—</span>':fmt(v[p])}</td>`).join('')}</tr>`;});
  });
  const tot=periods.map(p=>sum(DATA.assets.map(a=>(shareQ(a)||{})[p]||0)));
  body+=`<tr style="background:var(--raise)"><td style="font-weight:700">FLEET TOTAL</td><td></td>${tot.map(v=>`<td style="font-weight:700">${fmt(v)}</td>`).join('')}</tr>`;
  mount.innerHTML=`<div class="scroll"><table class="t"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}

function drawZones(){
  const z=DATA.zones||{}; if(!Object.keys(z).length)return;
  document.getElementById('zonewrap').style.display='block';
  const labels=['Wind Offshore','Wind Onshore'];const vals=[];for(const k in z)labels.forEach(l=>{if(z[k][l]!=null)vals.push(z[k][l]);});
  const mx=Math.max(...vals,1);
  document.getElementById('zones').innerHTML=Object.keys(z).map(k=>`<div style="padding:6px 0;border-bottom:1px solid var(--line)"><div style="font-weight:600;font-family:'Space Grotesk';margin-bottom:2px">${k}</div>${
    labels.map(l=>z[k][l]==null?'':`<div style="display:flex;align-items:center;gap:8px;margin:3px 0"><span style="width:96px;color:var(--mut);font-size:11px">${l}</span><div style="flex:1;height:11px;background:var(--bg2);border-radius:4px;overflow:hidden"><div style="height:100%;width:${z[k][l]/mx*100}%;background:${l==='Wind Offshore'?'var(--off)':'var(--on)'};border-radius:4px"></div></div><span class="mono" style="width:90px;text-align:right">${fmt(z[k][l])}</span></div>`).join('')}</div>`).join('');
}

function exportCSV(){
  const periods=allPeriods();
  const rows=[['Asset','Source','cons_pct',...periods]];
  DATA.assets.forEach(a=>{const v=shareQ(a)||{};rows.push([a.name,a.src,a.cons!=null?(a.cons*100).toFixed(1):'',...periods.map(p=>v[p]==null?'':(+v[p]).toFixed(1))]);});
  const tot=periods.map(p=>sum(DATA.assets.map(a=>(shareQ(a)||{})[p]||0)));
  rows.push(['FLEET TOTAL','','',...tot.map(v=>v.toFixed(1))]);
  const csv=rows.map(r=>r.map(c=>{const s=String(c);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');
  const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`orsted_fleet_${VIEW.show}_${VIEW.gran}.csv`;a.click();URL.revokeObjectURL(a.href);
}
</script>
</body></html>
